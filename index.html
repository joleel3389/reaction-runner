<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            /* CSS */
            
        </style>
        
        <title>Infinite reaction runner</title>
        <link rel="icon" href="/hachi-nerd.png">
    </head>
    <body>
        <!-- HTML -->
        
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
        <script>
            // JS
            var img;
            var userX;
            var userY;
            var groundY;
            var obstacleSpeed = 5;
            var velocity = 0;
            var gravity = 0.5;
            var onGround = true;
            var blockX;
            var powerUp = ['catalyst', 'temperature', 'pressure', 'concentration', 'surface area', 'volume'];
            var behavior = ['increasing', 'decreasing']
                        
            function preload() {
                // img = loadImage("");
            }

            function setup() {
                createCanvas(800, 600);
                noCursor();
                groundY = height - (height/6);
                userX = width/9;
                userY = groundY - 25;
                blockX = width
                console.log(userY);
            }

            function draw() {
                useGravity();
                checkCollision();
                scene();
                luckyBlock();
                user();

                // userMovement();

                userX = constrain(userX,0,width);
                // userY = constrain(userY,groundY - 75,groundY - 25);
                obstacleSpeed = constrain(obstacleSpeed,2,12)
            }

            function luckyBlock(){
                fill(255, 241, 157);
                stroke(194, 162, 113);
                strokeWeight(2);
                // rectMode(CENTER);
                rect(blockX,groundY - 50,50);
                textAlign(CENTER);
                textSize(25);
                textStyle(BOLD);
                fill(255);
                text("?", blockX + 25, groundY - 15);

                blockX -= obstacleSpeed;
                if(blockX < -50){
                    blockX = width 
                }
            }

            function usePowerUp(){
                var i = Math.floor(random(0, powerUp.length));
                var j = Math.floor(random(0,behavior.length));

                // if a catalyst...
                if(i === 0){
                    obstacleSpeed += 2;
                }
                // if INCREASING
                else if(j === 0){
                    // when factors EXCEPT volume and catalyst increase...
                    if(i > 0 && i < powerUp.length - 1){
                        obstacleSpeed += 2;
                    }
                    // when volume increases...
                    if(i === powerUp.length - 1){
                        obstacleSpeed -= 2;
                    }
                // if DECREASING...
                } else {
                    // when factors EXCEPT volume and catalyst increase...
                    if(i > 0 && i < powerUp.length - 1){
                        obstacleSpeed -= 2;
                    }
                    // when volume increases...
                    if(i === powerUp.length - 1){
                        obstacleSpeed += 2;
                    }
                }
            }

            function checkCollision(){
                if(userX - 25 < blockX + 50 && userX + 25 > blockX && userY + 25 > groundY - 50){
                    console.log('collison!');
                    blockX = width + 25;
                    usePowerUp();
                }
            }

            function useGravity(){
                // after the user jumps, gravity is there to pull the user back to the ground
                userY += velocity
                velocity += gravity;
                if(userY >= groundY - 25){
                    velocity = 0;
                    userY = groundY - 25;
                }
            }

            function scene(){
                background(200);
                // rectMode(LEFT);
                noStroke();
                fill(150);
                rect(0,groundY,width, height/6);
            }

            function user() {
                fill(0);
                noStroke();
                ellipse(userX, userY, 50)
            }

            function keyPressed() {
                if (key === 'w' || keyCode === UP_ARROW){
                    velocity =  -10;
                }
                // else if (keyCode === UP_ARROW){
                //     velocity = -10;
                // }
            }
            
        </script>
    </body>
</html>
